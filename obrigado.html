<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-564SBN4L');</script>
    <!-- End Google Tag Manager -->

    <title>Obrigado! – Link Net</title>
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --azul:    #002366;
            --ciano:   #3DB7E4;
            --texto:   #333333;
            --cinza:   #6c757d;
            --fundo:   #f4f7fb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--fundo);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0, 35, 102, 0.12);
        }

        .card-logo {
            height: 36px;
            width: auto;
            margin-bottom: 28px;
        }

        .check-circle {
            width: 72px;
            height: 72px;
            background: #eafaf1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            color: #25D366;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--azul);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 15px;
            color: var(--cinza);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* Caixa com a mensagem que será enviada ao WhatsApp */
        .preview-box {
            background: #f0faf4;
            border: 1.5px solid #b7e4c7;
            border-radius: 14px;
            padding: 18px 20px;
            text-align: left;
            margin-bottom: 28px;
        }

        .preview-box .preview-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--cinza);
            margin-bottom: 8px;
        }

        .preview-box p {
            font-size: 14px;
            color: var(--texto);
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            transition: background 0.2s, transform 0.15s;
            margin-bottom: 14px;
        }

        .btn-whatsapp:hover {
            background: #1ebe5a;
            transform: translateY(-2px);
        }

        .btn-whatsapp i { font-size: 22px; }

        .back-link {
            display: block;
            font-size: 13px;
            color: var(--cinza);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--azul); }

        @media (max-width: 480px) {
            .card { padding: 36px 24px; }
            h1 { font-size: 21px; }
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-564SBN4L"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="card">
        <img src="assets/images/logo.png" alt="LinkNet" class="card-logo">

        <div class="check-circle">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1>Recebemos seu contato!</h1>
        <p class="subtitle">
            Clique no botão abaixo e nossa equipe vai te atender<br>
            agora mesmo pelo WhatsApp. 😊
        </p>

        <!-- Preview da mensagem que será enviada -->
        <div class="preview-box">
            <div class="preview-label">Sua mensagem para a LinkNet:</div>
            <p id="msgPreview">Carregando…</p>
        </div>

        <a href="#" id="btnWhatsapp" class="btn-whatsapp" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-whatsapp"></i> Falar com a equipe de atendimento
        </a>

        <a href="/" class="back-link">← Voltar para o site</a>
    </div>

    <script>
    (function () {
        var WHATSAPP = '556932368140';

        // Ler dados do lead salvos pelo form.js
        var nome     = sessionStorage.getItem('ln_lead_nome')     || '';
        var intencao = sessionStorage.getItem('ln_lead_intencao') || '';
        var regiao   = sessionStorage.getItem('ln_lead_regiao')   || '';
        var plano    = sessionStorage.getItem('ln_lead_plano')    || '';

        // Montar mensagem para o WhatsApp
        var msg = 'Olá, vi seu anúncio no Google. Me chamo ' + (nome || 'um interessado');
        msg += ', estou buscando por ' + (intencao || 'internet');
        msg += ' e moro em ' + (regiao || 'Rondônia') + '.';
        if (plano) msg += '\n\nPlano de interesse: ' + plano;

        // Exibir preview no card
        var preview = document.getElementById('msgPreview');
        if (preview) preview.textContent = msg;

        // Montar link do WhatsApp
        var url = 'https://api.whatsapp.com/send/?phone=' + WHATSAPP
                + '&text=' + encodeURIComponent(msg);
        var btnWa = document.getElementById('btnWhatsapp');
        if (btnWa) btnWa.href = url;

        // Disparar evento de conversão via GTM
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: 'lead_conversion' });

        // ── Salvar lead no Supabase ──────────────────────────────
        try {
            var sb = supabase.createClient(
                'https://wxhbzdmmekeditxerqhd.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4aGJ6ZG1tZWtlZGl0eGVycWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDEzNjYsImV4cCI6MjA5MDIxNzM2Nn0.xq8jVwIjDfZjIx_QsHx2rAdJJmGl236JqYRVr4xbDHg'
            );

            // Resolver source/medium quando não há UTMs explícitas
            var rawSource   = sessionStorage.getItem('ln_lead_utm_source') || '';
            var rawMedium   = sessionStorage.getItem('ln_lead_utm_medium') || '';
            var rawGclid    = sessionStorage.getItem('ln_lead_gclid')      || '';
            var finalSource, finalMedium;

            if (rawSource) {
                // UTMs presentes: usar como vieram
                finalSource = rawSource;
                finalMedium = rawMedium || null;
            } else if (rawGclid) {
                // GCLID sem UTMs = Google Ads com auto-tagging
                finalSource = 'google';
                finalMedium = 'cpc';
            } else {
                // Sem nenhum parâmetro = acesso direto
                finalSource = 'direct';
                finalMedium = null;
            }

            sb.from('leads').insert([{
                nome:         nome,
                intencao:     intencao,
                regiao:       regiao,
                plano:        plano,
                utm_source:   finalSource,
                utm_medium:   finalMedium,
                utm_campaign: sessionStorage.getItem('ln_lead_utm_campaign') || null,
                utm_term:     sessionStorage.getItem('ln_lead_utm_term')     || null,
                utm_content:  sessionStorage.getItem('ln_lead_utm_content')  || null,
                gclid:        rawGclid || null
            }]).then(function (res) {
                if (res.error) console.warn('[Supabase] Erro ao salvar lead:', res.error.message);
            });
        } catch (e) {
            console.warn('[Supabase] Falha na inicialização:', e);
        }
        // ────────────────────────────────────────────────────────

        // Auto-abrir o WhatsApp após 1.8s (melhora experiência mobile)
        setTimeout(function () {
            if (btnWa && btnWa.href !== '#') {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
        }, 1800);

    })();
    </script>
</body>
</html>
